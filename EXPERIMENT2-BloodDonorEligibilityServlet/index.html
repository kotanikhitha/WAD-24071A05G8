<!DOCTYPE html>
<html>
<head>
    <title>Blood Donor Eligibility Check</title>
</head>
<body>
    <h2>Check Blood Donor Eligibility</h2>
    <form action="checkEligibility" method="POST">
        <label>Enter Age (in years):</label><br>
        <input type="number" name="age" required><br><br>
        
        <label>Enter Weight (in kg):</label><br>
        <input type="number" name="weight" step="0.1" required><br><br>
        
        <input type="submit" value="Check Eligibility">
    </form>
</body>
</html>
